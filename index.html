<!DOCTYPE html>
<html>
<head>
  <title>Mini Shooter PRO</title>
  <style>
    body { margin: 0; overflow: hidden; }
    #crosshair {
      position: fixed;
      top: 50%; left: 50%;
      width: 8px; height: 8px;
      margin-left: -4px; margin-top: -4px;
      background: white;
      border-radius: 50%;
    }
  </style>
</head>
<body>

<div id="crosshair"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x4fc3f7); // яркое небо

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// свет
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);

// ===== КАРТА =====
const MAP_SIZE = 50;
const HALF = MAP_SIZE/2;

// пол (пустыня)
for (let x = -HALF; x < HALF; x++) {
  for (let z = -HALF; z < HALF; z++) {
    const tile = new THREE.Mesh(
      new THREE.BoxGeometry(1,0.1,1),
      new THREE.MeshStandardMaterial({ color: 0xd2b48c })
    );
    tile.position.set(x,-0.05,z);
    scene.add(tile);
  }
}

// границы (серые стены)
const walls = [];
function createWall(x,z,w,h,d,color=0xaaaaaa){
  const wall = new THREE.Mesh(
    new THREE.BoxGeometry(w,h,d),
    new THREE.MeshStandardMaterial({color})
  );
  wall.position.set(x,h/2,z);
  scene.add(wall);
  walls.push(wall);
}

// границы карты
createWall(0,-HALF,MAP_SIZE,3,1);
createWall(0,HALF,MAP_SIZE,3,1);
createWall(-HALF,0,1,3,MAP_SIZE);
createWall(HALF,0,1,3,MAP_SIZE);

// препятствия (кирпич)
for(let i=0;i<20;i++){
  createWall(
    (Math.random()-0.5)*40,
    (Math.random()-0.5)*40,
    3,2,1,
    0x8b4513
  );
}

// ===== ОРУЖИЕ (типо АК) =====
const gun = new THREE.Group();

const body = new THREE.Mesh(
  new THREE.BoxGeometry(0.4,0.2,1),
  new THREE.MeshStandardMaterial({color:0x222222})
);
gun.add(body);

const barrel = new THREE.Mesh(
  new THREE.BoxGeometry(0.1,0.1,1),
  new THREE.MeshStandardMaterial({color:0x111111})
);
barrel.position.z = -1;
gun.add(barrel);

const grip = new THREE.Mesh(
  new THREE.BoxGeometry(0.15,0.4,0.15),
  new THREE.MeshStandardMaterial({color:0x5c3a21})
);
grip.position.set(0,-0.3,0.2);
gun.add(grip);

gun.position.set(0.5,-0.4,-1);
camera.add(gun);
scene.add(camera);

// ===== ВРАГИ =====
const enemies = [];

function spawnEnemy(){
  const enemy = new THREE.Group();

  const body = new THREE.Mesh(
    new THREE.BoxGeometry(0.6,1,0.4),
    new THREE.MeshStandardMaterial({color:0xff0000})
  );

  const head = new THREE.Mesh(
    new THREE.BoxGeometry(0.4,0.4,0.4),
    new THREE.MeshStandardMaterial({color:0xffccaa})
  );
  head.position.y = 0.9;

  enemy.add(body);
  enemy.add(head);

  enemy.position.set(
    (Math.random()-0.5)*40,
    0.5,
    (Math.random()-0.5)*40
  );

  scene.add(enemy);
  enemies.push(enemy);
}

// спавн каждые 10 сек по 5
setInterval(()=>{
  for(let i=0;i<5;i++) spawnEnemy();
},10000);

// ===== ПУЛИ =====
const bullets = [];

function shoot(){
  const bullet = new THREE.Mesh(
    new THREE.SphereGeometry(0.05),
    new THREE.MeshBasicMaterial({color:0xffff00})
  );

  bullet.position.copy(camera.position);

  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);

  bullet.userData.vel = dir.multiplyScalar(0.8);

  scene.add(bullet);
  bullets.push(bullet);
}

// ===== УПРАВЛЕНИЕ =====
const keys = {};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

document.body.onclick=()=>document.body.requestPointerLock();

let yaw=0,pitch=0;

document.addEventListener("mousemove",e=>{
  if(document.pointerLockElement===document.body){
    yaw -= e.movementX * 0.001; // меньше чувствительность
    pitch -= e.movementY * 0.001;
    pitch = Math.max(-Math.PI/2,Math.min(Math.PI/2,pitch));
  }
});

document.addEventListener("mousedown",shoot);

// ===== ДВИЖЕНИЕ =====
camera.position.y=1.6;function move(){
  const speed=0.1;
  const dir=new THREE.Vector3();
  camera.getWorldDirection(dir);

  const right=new THREE.Vector3();
  right.crossVectors(camera.up,dir).normalize();

  if(keys["w"]) camera.position.addScaledVector(dir,speed);
  if(keys["s"]) camera.position.addScaledVector(dir,-speed);
  if(keys["a"]) camera.position.addScaledVector(right,speed);
  if(keys["d"]) camera.position.addScaledVector(right,-speed);

  // границы
  camera.position.x = Math.max(-HALF+1, Math.min(HALF-1, camera.position.x));
  camera.position.z = Math.max(-HALF+1, Math.min(HALF-1, camera.position.z));
}

// ===== ОБНОВЛЕНИЕ =====
function update(){
  // пули
  bullets.forEach((b,i)=>{
    b.position.add(b.userData.vel);

    enemies.forEach((e,ei)=>{
      if(b.position.distanceTo(e.position)<0.7){
        scene.remove(e);
        enemies.splice(ei,1);
      }
    });
  });
}

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);

  move();
  update();

  camera.rotation.order="YXZ";
  camera.rotation.y=yaw;
  camera.rotation.x=pitch;

  renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
